name: Update usage stats

on:
  schedule:
    - cron: "17 2,8,14,20 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          path: ai-stack-extras
          persist-credentials: false
      - name: Check manifest
        working-directory: ai-stack-extras
        run: |
          scripts/check_usage_manifest.sh
          scripts/check_cu_manifest.sh

  update:
    runs-on: ubuntu-latest
    needs: check-manifest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - name: Update stats
        run: |
          python3 scripts/update_usage_stats.py
          python3 scripts/update_cu_stats.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Commit changes
        run: |
          paths="stats/usage-v1.json stats/usage-v1.md stats/cu-v1.json stats/cu-v1.md"
          if [ -z "$(git status --porcelain -- $paths)" ]; then
            echo "No usage count changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $paths
          git commit -m "Update usage stats"
          git push
